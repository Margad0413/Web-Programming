<!DOCTYPE html>
<!-- 태그들은 모두 포함관계다. A안에 B가 있지. 둘이 교차하진 않음. -->
<html lang="en">
<head>
    <!-- 메타 데이터: 데이터의 데이터. 설명. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body title="body는 본문을 의미합니다.">
    <!-- 태그: <pre> <br>  -->
    <!-- 엔티티 코드: &nbsp; &lt; &gt; -->
    <!-- 엔티티 코드 없이 써짐: " ' / - _ ` & -->
    <p>문서의 본문은 body 안에서 시작 &lt;hr&gt;</p>
    <hr>
    <p><b>하이퍼링크</b>, <i>이미지</i>, <u>테이블</u>, <del>최소선</del>, 
    <small>작게</small>, <mark>강조</mark></p>

    <h1>h1</h1>
    <h2>h2</h2>
    <h3>h3</h3>
    <h4>h4</h4>
    <h5>h5</h5>
    <h6>h6</h6>
    log<sub>2</sub>2<sup>3</sup>
</body>
</html>
