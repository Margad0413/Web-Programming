<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 리스너 사용하기</title>
    <link rel="stylesheet" href="styel_js.css">
    <style>
        body {text-align: center;}
        #rotateImage { transition: transform 1s;}
    </style>
</head>
<body>
    <h4>마우스 커서를 이미지 위에 올렸다가 치워보세요.</h4>
    <img id="rotateImage" src="banana.jpg">
    <script>
        let image = document.getElementById("rotateImage");
        
        image.onmouseover = function gone(){
            image.style.transform = "scale(0,0)";
        }
        image.onmouseout = function back(){
            image.style.transform = "scale(1,1)";
        }
    </script>
</body>
</html>
