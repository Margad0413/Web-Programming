<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다양한 버튼 만들기</title>
</head>
<body>
    <p>단순 버튼: <input type="button" value="in_tag"> <button type="button">bu_tag</button><br></p>
    <p>제출 버튼: <input type="submit" value="in_tag"> <button type="submit">bu_tag</button><br></p>
    <p>초기화 버튼: <input type="reset" value="in_tag"> <button type="reset">bu_tag</button><br></p>
    <p>이미지 버튼: <input type="image" src="button.png"> <button type="button"><img src="button.png"></button></p>
</body>
</html>
