<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id, 클래스 선택자</title>
    <style>
        p{ color: purple;}
        #id1{ color: red;}
        #id2{ color: green;}
    </style>
</head>
<body>
    <h2>바나나</h2>
    <p><img src="banana.jpg" width="120"></p>
    <p id="id1">노란색의 아열대 과일</p>
    <p>지방이 없어 체중 조절에 좋음</p>
    <p id="id2">식이섬유가 풍부해 주식 대용으로 적당</p>
</body>
</html>
