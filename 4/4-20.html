<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기본적인 박스 모델</title>
    <style>
        div{
            background-color: #ffffef;
            width: 100px;
            height: 100px;
            padding: 15px;
            border: 5px solid #ffbf69;
            margin: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div style="border-radius: 10px;">A</div>
    <div style="border-radius: 20px 40px;">B</div>
    <div style="border-radius: 20px 80px;">B</div>
    <div style="border-radius: 50%;">C</div>
</body>
</html>
