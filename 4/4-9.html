<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자식과 후손 선택자 사용하기</title>
    <style>
        div>p{ color: green;}
        div p{ background-color: gold;}
    </style>
</head>
<body>
    <h2>바나나</h2>
    <p><img src="banana.jpg" width="120"></p>
    <div>
        <p>노란색의 아열대 과일</p>
        <span><p>지방이 없어 체중 조절에 좋음</p></span>
    </div>
    <p>식이섬유가 풍부해 조식 대용으로 적당</p>
</body>
</html>
