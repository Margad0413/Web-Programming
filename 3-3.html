<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- inline 태그: 줄바꿈 없음, block 태그: 줄 바꿈 있음 -->
    <!-- block 태그는 영역(한줄)을 차지함 -->
    <!-- div는 원래 block이지만, display:inline-block 해주면 inline으로 바꿀 수 있음 -->
    <!-- 시맨틱 태그전에는 span, div 태그를 사용했었음 -->
    <!-- 시맨틱 태그(body,nave,footer같이 데이터 영역 구분을 위한 태그), 로봇(웹페이지 정보 가져와서 검색엔진에 사용하는거)이 원래 스크롤할떄 구분하라고 있었음 
     근데 요즘은 AI가 발전해서 데이터 스크롤이 잘돼서, 시맨틱 태그가 의미있나? 하지만 배워-->
    <div style=" width: 1000px; height: 50px; background: #ff9999;">
        박스 1
    </div> 
    <div style=" width: 1000px; height: 50px; background: #99ccff">
        <div style="display: inline-block; width: 100px; height: 50px; background: red">박스 2</div>
        <div style="display: inline-block; width: 750px; height: 50px; background: blue">박스 3</div>
        <div style="display: inline-block; width: 100px; height: 50px; background: yellow">박스 4</div>
    </div> 
    <div style=" width: 1000px; height: 50px; background: #99ff99;">
        박스 5
    </div> 
</body>
</html>
